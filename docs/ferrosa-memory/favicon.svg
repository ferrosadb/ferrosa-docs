<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee7ff"/>
      <stop offset="55%" stop-color="#348cff"/>
      <stop offset="100%" stop-color="#516d92"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#05070c"/>
  <!-- Frame -->
  <rect x="3" y="3" width="26" height="26" rx="5.5" fill="none" stroke="url(#fm)" stroke-width="1.5"/>
  <!-- Fm -->
  <text x="16" y="21.5" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="700" fill="url(#fm)">Fm</text>
  <!-- 100 -->
  <text x="6" y="10.5" font-family="sans-serif"
        font-size="5" font-weight="600" fill="#7d9fca">100</text>
