<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee7ff"/>
      <stop offset="55%" stop-color="#348cff"/>
      <stop offset="100%" stop-color="#516d92"/>
    </linearGradient>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee7ff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#348cff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4feff"/>
      <stop offset="45%" stop-color="#7ee7ff"/>
      <stop offset="100%" stop-color="#2f7cff"/>
    </linearGradient>
  </defs>

  <!-- Orbital ring -->
  <ellipse cx="50" cy="50" rx="47" ry="47" fill="none" stroke="url(#rg)" stroke-width="1.5"
           stroke-dasharray="216 80" transform="rotate(-20, 50, 50)"/>

  <!-- Memory graph cue: three nodes linked by a retrieval path -->
  <g opacity="0.55" stroke="url(#rg)" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M22 72 C36 60 46 60 58 64"/>
    <path d="M24 32 C38 42 50 42 62 36"/>
  </g>
  <g fill="url(#ng)" opacity="0.85">
    <circle cx="22" cy="72" r="3"/>
    <circle cx="24" cy="32" r="2.5"/>
    <circle cx="72" cy="40" r="3"/>
  </g>

  <!-- Rounded square -->
  <rect x="14" y="14" width="72" height="72" rx="15" ry="15"
        fill="none" stroke="url(#ig)" stroke-width="2.5"/>

  <!-- Fm -->
  <text x="50" y="61" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="700" fill="url(#ig)"
        letter-spacing="-1">Fm</text>

  <!-- 100 -->
  <text x="24" y="30" font-family="'Inter', sans-serif"
        font-size="9" font-weight="600" fill="#7d9fca">100</text>
</svg>
