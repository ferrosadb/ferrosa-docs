<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120">
  <defs>
    <linearGradient id="fm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee7ff"/>
      <stop offset="55%" stop-color="#348cff"/>
      <stop offset="100%" stop-color="#516d92"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ee7ff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#348cff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4feff"/>
      <stop offset="45%" stop-color="#7ee7ff"/>
      <stop offset="100%" stop-color="#2f7cff"/>
    </linearGradient>
  </defs>

  <!-- Mark: Fm inside rounded square with orbital ring + memory-graph cue -->
  <g transform="translate(10, 10)">
    <!-- Outer orbital ring (partial) -->
    <ellipse cx="50" cy="50" rx="48" ry="48" fill="none" stroke="url(#ring-grad)" stroke-width="1.5"
             stroke-dasharray="220 82" transform="rotate(-20, 50, 50)"/>

    <!-- Memory graph cue -->
    <g opacity="0.5" stroke="url(#ring-grad)" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M22 74 C36 62 46 62 58 66"/>
      <path d="M24 30 C38 40 50 40 62 34"/>
    </g>
    <g fill="url(#node-grad)" opacity="0.85">
      <circle cx="22" cy="74" r="3"/>
      <circle cx="24" cy="30" r="2.5"/>
      <circle cx="74" cy="40" r="3"/>
    </g>

    <!-- Rounded square frame -->
    <rect x="12" y="12" width="76" height="76" rx="16" ry="16"
          fill="none" stroke="url(#fm-grad)" stroke-width="2.5"/>

    <!-- Fm text -->
    <text x="50" y="62" text-anchor="middle"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="38" font-weight="700" fill="url(#fm-grad)"
          letter-spacing="-1">Fm</text>

    <!-- Atomic number nod (100 = fermium) -->
    <text x="24" y="28" text-anchor="start"
          font-family="'Inter', -apple-system, sans-serif"
          font-size="11" font-weight="600" fill="#7d9fca">100</text>
  </g>

  <!-- Wordmark -->
  <text x="130" y="66" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="40" font-weight="800" fill="#e8e8ed" letter-spacing="-2">ferrosa <tspan fill="#348cff">memory</tspan></text>

  <!-- Tagline -->
  <text x="132" y="92" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="500" fill="#7d9fca" letter-spacing="0.5">Typed, durable memory for agent trajectories</text>
</svg>
